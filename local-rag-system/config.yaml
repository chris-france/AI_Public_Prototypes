# Local RAG System Configuration
# Easy model swapping - change model.name when upgrading hardware

model:
  # Current: Optimized for 16GB MacBook M5
  name: "llama3.2:3b"
  # Future Mac Studio 512GB options:
  # name: "qwen2.5:14b"
  # name: "llama3.1:70b"

  # Generation parameters
  temperature: 0.7
  top_k: 5
  max_tokens: 2048

embedding:
  # Using Ollama's embedding endpoint
  model: "nomic-embed-text"
  # Alternative: "mxbai-embed-large"

qdrant:
  url: "http://localhost:6333"
  collections:
    documents: "documents"      # Uploaded files
    chat_memory: "chat_memory"  # Persistent conversation history

chunking:
  size: 512      # tokens per chunk
  overlap: 50    # token overlap between chunks

retrieval:
  top_k_documents: 5    # Number of document chunks to retrieve
  top_k_memory: 3       # Number of past conversation turns to retrieve
  score_threshold: 0.5  # Minimum similarity score

ollama:
  base_url: "http://localhost:11434"

server:
  host: "0.0.0.0"
  port: 8605
