services:
  # Vector database for persistent memory
  qdrant:
    image: qdrant/qdrant:latest
    container_name: local-rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped

  # Open WebUI - Chat interface on port 8605
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: local-rag-webui
    ports:
      - "8605:8080"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - WEBUI_SECRET_KEY=local-rag-secret-key
      - ENABLE_SIGNUP=true
      - DEFAULT_USER_ROLE=admin
    volumes:
      - ./open-webui-data:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      - qdrant

volumes:
  qdrant_storage:
  open-webui-data:
